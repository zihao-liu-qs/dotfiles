# One Dark 主题配置
# 使用方法：在 kitty.conf 中添加 include onedark.conf

# 基础颜色
foreground #abb2bf
background #171717
selection_foreground #abb2bf
selection_background #323842

# 光标颜色
cursor #abb2bf
cursor_text_color #21252b

# 普通颜色 (Ansi 0-7)
color0 #21252b
color1 #e06c75
color2 #98c379
color3 #e5c07b
color4 #61afef
color5 #c678dd
color6 #56b6c2
color7 #abb2bf

# 高亮颜色 (Ansi 8-15)
color8  #767676
color9  #e06c75
color10 #98c379
color11 #e5c07b
color12 #61afef
color13 #c678dd
color14 #56b6c2
color15 #abb2bf

