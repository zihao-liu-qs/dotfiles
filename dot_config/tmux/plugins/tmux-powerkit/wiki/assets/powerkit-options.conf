# =============================================================================
# PowerKit - Complete Configuration Reference
# =============================================================================
# This file contains all available PowerKit options with their default values.
# Copy the options you want to customize to your ~/.tmux.conf
#
# Option naming convention:
#   Global:  @powerkit_<option>
#   Plugin:  @powerkit_plugin_<plugin>_<option>
#
# Key notation for keybindings:
#   C-x  = Ctrl + x
#   M-x  = Alt/Meta + x
#   S-x  = Shift + x
#   ""   = Disabled (empty string)
#
# Table of Contents:
#   1. GLOBAL           - Theme, transparency
#   2. PLUGINS          - Plugin selection, groups, external
#   3. STATUS BAR       - Position, layout, order, caching, separators
#   4. SESSION          - Session segment icons and colors
#   5. WINDOWS          - Window icons, titles, index style
#   6. PANES            - Pane borders, status, flash effect
#   7. UI ELEMENTS      - Clock, popups, menus
#   8. KEYBINDINGS      - All keybindings
#   9. PLUGIN OPTIONS   - Individual plugin configuration
# =============================================================================


# #############################################################################
#                              1. GLOBAL
# #############################################################################

# =============================================================================
# THEME
# =============================================================================

# Theme name
# Available themes (32 total):
#   atom, ayu, catppuccin, cobalt2, darcula, dracula, everforest, flexoki,
#   github, gruvbox, horizon, iceberg, kanagawa, kiribyte, material, molokai,
#   monokai, moonlight, night-owl, nord, oceanic-next, onedark, pastel,
#   poimandres, rose-pine, slack, snazzy, solarized, spacegray, synthwave,
#   tokyo-night, vesper
set -g @powerkit_theme "catppuccin"

# Theme variant (depends on selected theme)
# Variants per theme:
#   atom: dark
#   ayu: dark, mirage, light
#   catppuccin: mocha, macchiato, frappe, latte
#   cobalt2: default
#   darcula: default
#   dracula: dark
#   everforest: dark, light
#   flexoki: dark, light
#   github: dark, light
#   gruvbox: dark, light
#   horizon: default
#   iceberg: dark, light
#   kanagawa: dragon, lotus
#   kiribyte: dark, light
#   material: default, ocean, palenight, lighter
#   molokai: dark
#   monokai: dark, light
#   moonlight: default
#   night-owl: default, light
#   nord: dark
#   oceanic-next: default, darker
#   onedark: dark
#   pastel: dark, light
#   poimandres: default
#   rose-pine: main, moon, dawn
#   slack: dark
#   snazzy: default
#   solarized: dark, light
#   spacegray: dark
#   synthwave: 84
#   tokyo-night: night, storm, day
#   vesper: default
set -g @powerkit_theme_variant "mocha"

# Path to custom theme file (overrides theme/variant settings)
# Must point to a valid theme file with THEME_COLORS array
# Example: "~/.config/tmux/my-theme.sh"
set -g @powerkit_custom_theme_path ""

# Enable transparent background
# Values: "true", "false"
# When true, uses terminal background color for status bar
set -g @powerkit_transparent "false"


# #############################################################################
#                              2. PLUGINS
# #############################################################################

# =============================================================================
# PLUGIN SELECTION
# =============================================================================

# Active plugins (comma-separated list)
# Available plugins (42 total):
#   System Monitoring (13):
#     battery, cpu, disk, fan, gpu, iops, loadavg, memory, swap, temperature,
#     uptime, volume, brightness
#   Network (7):
#     external_ip, netspeed, ping, vpn, weather, wifi, ssh
#   Development (8):
#     git, github, gitlab, bitbucket, jira, kubernetes, terraform, cloud
#   Media (4):
#     nowplaying, audiodevices, camera, microphone
#   Productivity (5):
#     datetime, timezones, pomodoro, smartkey, bitwarden
#   Financial (2):
#     crypto, stocks
#   Services (4):
#     cloudstatus, packages, bluetooth, hostname
set -g @powerkit_plugins "datetime,battery,cpu,memory,hostname,git"

# =============================================================================
# EXTERNAL PLUGINS
# =============================================================================
# Add custom content from shell commands
# Format: external("icon"|"content"|"accent"|"accent_icon"|"ttl")
#   icon       - Icon to display (Nerd Font icon)
#   content    - Static text or command: "text", "$(cmd)", "#(cmd)"
#   accent     - Background color: theme color name or hex
#   accent_icon - Icon background color
#   ttl        - Cache duration in seconds
#
# Examples:
#   external(""|"$(whoami)"|"ok-base"|"ok-base-lighter"|"3600")
#   external("󰔟"|"$(uptime -p | sed 's/up //')"|"info-base"|"info-base-lighter"|"60")
#   external("󰍡"|"Custom"|"window-active-base"|"window-active-base-lighter"|"0")
#
# Usage in plugins list:
#   set -g @powerkit_plugins "cpu,external(\"󰊠\"|\"$(hostname)\"|\"info-base\"|\"info-base-lighter\"|\"60\"),git"

# =============================================================================
# PLUGIN GROUPS
# =============================================================================
# Visually group related plugins with shared background color
# Format: group(plugin1,plugin2,plugin3)
#
# Each group gets a different color from the group color palette.
# Groups create visual boundaries between plugin categories.
#
# Examples:
#   group(cpu,memory,loadavg)           - System monitoring group
#   group(git,github,gitlab)            - Development group
#
# Usage in plugins list:
#   set -g @powerkit_plugins "group(cpu,memory),group(git,github),datetime"
#
# Visual result:
#   ┌─────────────────┐ ┌─────────────────┐ ┌──────────┐
#   │  CPU 45%  MEM 62% │ │  main  +3  │ │ 14:32 │
#   │   (blue group)    │ │ (purple group) │ │ (default)│
#   └─────────────────┘ └─────────────────┘ └──────────┘

# Group color palette (comma-separated theme colors or hex values)
# Groups are assigned colors in order from this palette
# Default palette:
#   1: info-base-darker          (blue)
#   2: window-active-base-darker (purple)
#   3: ok-base-darker            (green)
#   4: warning-base-darker       (yellow)
#   5: error-base-darker         (red)
#   6: disabled-base             (gray)
set -g @powerkit_plugin_group_colors "info-base-darker,window-active-base-darker,ok-base-darker,warning-base-darker,error-base-darker,disabled-base"


# #############################################################################
#                              3. STATUS BAR
# #############################################################################

# =============================================================================
# BASIC SETTINGS
# =============================================================================

# Status bar refresh interval (seconds)
# Values: any positive integer
# Recommended: 5 (balanced), 2 (responsive), 10 (low CPU)
set -g @powerkit_status_interval "5"

# Status bar position
# Values: "top", "bottom"
set -g @powerkit_status_position "top"

# Window list alignment
# Values: "left", "centre", "right"
set -g @powerkit_status_justify "left"

# =============================================================================
# LAYOUT
# =============================================================================

# Status bar layout mode
# Values:
#   "single" - Traditional single status line (default)
#   "double" - Two status lines: Line 0 = Session + Windows, Line 1 = Plugins
set -g @powerkit_bar_layout "single"

# Status bar element order
# Comma-separated list of: session, windows, plugins
#
# 2-element orders (auto-expanded with windows):
#   "session,plugins" - Session+windows LEFT, plugins RIGHT (default)
#   "plugins,session" - Plugins LEFT, windows+session RIGHT
#
# 3-element orders (enables CENTERED layout):
#   "session,windows,plugins" - Session LEFT, windows CENTER, plugins RIGHT
#   "plugins,windows,session" - Plugins LEFT, windows CENTER, session RIGHT
#   "session,plugins,windows" - Session LEFT, plugins CENTER, windows RIGHT
#
# Any element in the middle position will be centered in the status bar
set -g @powerkit_status_order "session,plugins"

# =============================================================================
# CACHING (Stale-While-Revalidate)
# =============================================================================
# PowerKit uses a stale-while-revalidate caching strategy for fast UI response.
# When data is "stale" (older than TTL but within the stale window), cached data
# is shown immediately with visual indication while fresh data is fetched.
#
# Cache State Flow:
#   FRESH (age <= TTL)           -> Return cache, stale=0 (normal colors)
#   STALE (TTL < age <= TTL*M)   -> Return cache + bg refresh, stale=1 (darker)
#   VERY OLD (age > TTL*M)       -> Synchronous refresh (blocking), stale=0
#   COLLECTION FAILED            -> Return previous cache, stale=1 (darker)

# Enable stale-while-revalidate pattern
# Values: "true", "false"
set -g @powerkit_lazy_loading "true"

# Maximum staleness as multiple of TTL
# Values: any positive integer
# Example: TTL=300s, multiplier=3 -> data up to 900s old can be returned
set -g @powerkit_stale_multiplier "3"

# Visual indicator for stale data (color variant applied to backgrounds)
# Values: "-darker", "-darkest", "-lighter", "-lightest"
set -g @powerkit_stale_color_variant "-darker"

# =============================================================================
# SEPARATORS
# =============================================================================

# Main separator style between segments
# Values:
#   "normal"    - Solid powerline arrows ()
#   "rounded"   - Rounded powerline ()
#   "slant"     - Slanted diagonal ()
#   "slantup"   - Upward slant ()
#   "trapezoid" - Trapezoid shape ()
#   "flame"     - Flame/fire style ()
#   "pixel"     - Pixelated blocks ()
#   "honeycomb" - Hexagonal pattern ()
#   "none"      - No separators
set -g @powerkit_separator_style "normal"

# Edge separator style (start/end of bar)
# Format: "style" or "style:all"
# Values:
#   "same"          - Use main separator_style (no special edge treatment)
#   "rounded"       - Rounded at standard edge points only
#   "rounded:all"   - Rounded at ALL external edges (session, windows, plugins)
#   "flame:all"     - Flame at ALL external edges
#   ...any style with optional :all suffix
# The :all suffix applies edge separators to ALL element boundaries
set -g @powerkit_edge_separator_style "rounded"

# Add gaps between status bar elements
# Values:
#   "false"   - No spacing (connected segments) - default
#   "true"    - Spacing everywhere
#   "both"    - Same as true
#   "windows" - Spacing only between windows
#   "plugins" - Spacing only between plugins
set -g @powerkit_elements_spacing "false"

# Padding around plugin icons
# Controls spacing around icons to normalize visual appearance for icons
# with different widths. PowerKit uses dynamic padding based on icon
# width detection (1-wide vs 2-wide icons).
# Values:
#   1 - Minimal padding (1 space each side) - compact look
#   2 - Standard padding (2 spaces each side) - balanced spacing
#   3 - Wide padding (3 spaces each side) - generous spacing
# Tip: If icons appear inconsistently spaced, try increasing this value.
set -g @powerkit_icon_padding "1"


# #############################################################################
#                              4. SESSION
# #############################################################################

# =============================================================================
# SESSION ICONS
# =============================================================================

# Session segment icon
# Values:
#   "auto" - Auto-detect OS icon (Apple for macOS, Tux for Linux, etc.)
#   Any Nerd Font icon character
set -g @powerkit_session_icon "auto"

# Icon when prefix key is pressed
set -g @powerkit_session_prefix_icon ""

# Icon in copy mode
set -g @powerkit_session_copy_icon ""

# =============================================================================
# SESSION COLORS
# =============================================================================

# Session segment colors (semantic names from theme)
# Values: theme color names like "session-bg", "session-prefix-bg", hex colors
set -g @powerkit_session_prefix_color "session-prefix-bg"
set -g @powerkit_session_copy_mode_color "session-copy-bg"
set -g @powerkit_session_normal_color "session-bg"

# =============================================================================
# SESSION MODE DISPLAY
# =============================================================================

# Display session mode indicator
# Values: "true", "false"
# When enabled, shows the current session mode in the session segment:
#   (prefix)  - Prefix key is pressed
#   (search)  - Search is active in copy mode
#   (copy)    - Copy/selection mode is active
#   (command) - Command prompt is active
# Modes are prioritized: prefix > search > copy > command > normal (no indicator)
set -g @powerkit_session_show_mode "false"


# #############################################################################
#                              5. WINDOWS
# #############################################################################

# =============================================================================
# WINDOW ICONS
# =============================================================================

# Active window icon
set -g @powerkit_active_window_icon ""

# Inactive window icon
set -g @powerkit_inactive_window_icon ""

# Zoomed pane indicator icon
set -g @powerkit_zoomed_window_icon "󰊓"

# Window activity/bell/marked icons
set -g @powerkit_window_activity_icon "󰂚"
set -g @powerkit_window_bell_icon "󰂞"
set -g @powerkit_window_marked_icon "󰃀"

# =============================================================================
# WINDOW TITLE
# =============================================================================

# Window title format
# Values: tmux format strings
#   #W - window name
#   #I - window index
#   #F - window flags
#   #{b:pane_current_path} - basename of current path
set -g @powerkit_active_window_title "#W"
set -g @powerkit_inactive_window_title "#W"

# =============================================================================
# WINDOW INDEX STYLE
# =============================================================================

# Window index display style
# Values: "text", "numeric", "box", "box_outline", "box_multiple", "box_multiple_outline", "circle", "circle_outline"
# Styles:
#   text                  - Plain numbers: 0, 1, 2, 3...
#   numeric               - Nerd Font icons: 󰬹, 󰬺, 󰬻, 󰬼...
#   box                   - Filled boxes: 󰎡, 󰎤, 󰎧, 󰎪...
#   box_outline           - Outlined boxes: 󰎣, 󰎦, 󰎩, 󰎬...
#   box_multiple          - Multiple filled: 󰼎, 󰼏, 󰼐, 󰼑...
#   box_multiple_outline  - Multiple outlined: 󰎢, 󰎥, 󰎨, 󰎫...
#   circle                - Filled circles: 󰲞, 󰲠, 󰲢, 󰲤...
#   circle_outline        - Outlined circles: 󰲟, 󰲡, 󰲣, 󰲥...
# Note: Multi-digit indices (10+) combine single digit icons
set -g @powerkit_window_index_style "text"

# =============================================================================
# WINDOW INDEX VISIBILITY
# =============================================================================

# Show window index on active windows
# Values: "true", "false"
set -g @powerkit_active_window_show_index "true"

# Show window index on inactive windows
# Values: "true", "false"
# Examples:
#   true, true   - Show index on all windows (default)
#   true, false  - Show index only on active window
#   false, true  - Show index only on inactive windows
#   false, false - Hide index on all windows
set -g @powerkit_inactive_window_show_index "true"


# #############################################################################
#                              6. PANES
# #############################################################################

# =============================================================================
# PANE BORDERS
# =============================================================================

# Pane border line style
# Values: "single", "double", "heavy", "simple", "number"
set -g @powerkit_pane_border_lines "single"

# Use single color for all pane borders (removes two-color effect when panes meet)
# Values: "true", "false"
set -g @powerkit_pane_border_unified "false"

# Unified pane border color (when unified=true)
# Values: theme color name or hex color
# Examples: "pane-border-active", "statusbar-bg", "#3b4261"
set -g @powerkit_pane_border_color "pane-border-active"

# Separate colors for active/inactive panes (when unified=false)
set -g @powerkit_active_pane_border_color "pane-border-active"
set -g @powerkit_inactive_pane_border_color "pane-border-inactive"

# =============================================================================
# PANE STATUS LINE
# =============================================================================

# Show pane status line
# Values: "off", "top", "bottom"
set -g @powerkit_pane_border_status "off"

# Background color for the pane status line
# Values: "none" (transparent), theme color name, or hex color
# Examples: "none", "info-base", "statusbar-bg", "#3b4261"
# Note: This only affects the status line, not the border lines
set -g @powerkit_pane_border_status_bg "none"

# Pane status format string
# Available placeholders:
#   {index}      - Pane index number
#   {title}      - Pane title
#   {command}    - Current command running in pane
#   {path}       - Full current path
#   {basename}   - Basename of current path
#   {active}     - Shows "▶" only on active pane (useful with unified border)
#
# Examples:
#   "{index}: {title}"           - Default: "0: zsh"
#   "{active} {basename}"        - "▶ tmux-powerkit" (active pane)
#   "{active} {command}"         - "▶ nvim" (active) or "zsh" (inactive)
#
# Note: Active pane text is displayed in bold, inactive uses normal weight
set -g @powerkit_pane_border_format "{index}: {title}"

# =============================================================================
# PANE SYNCHRONIZED ICON
# =============================================================================

# Synchronized panes indicator icon (shown in active window)
set -g @powerkit_pane_synchronized_icon "✵"

# =============================================================================
# PANE FLASH EFFECT
# =============================================================================
# Visual feedback when selecting/clicking on a pane.
# The pane background briefly flashes a color to indicate selection.

# Enable pane flash on selection
# Values: "true", "false"
set -g @powerkit_pane_flash_enabled "false"

# Flash background color
# Values: theme color name (e.g., "statusbar-bg", "info-base") or hex color (#RRGGBB)
# Default: "statusbar-bg" (uses status bar background color from theme)
set -g @powerkit_pane_flash_color "statusbar-bg"

# Flash duration in milliseconds
# Values: any positive integer (recommended: 50-200)
# Lower values = subtle flash, higher values = more visible
set -g @powerkit_pane_flash_duration "100"


# =============================================================================
# PANE SCROLLBARS (tmux 3.4+)
# =============================================================================
# Character-based scrollbars that appear on the side of panes.
# The slider (foreground) represents the visible portion of the pane.
# The track (background) represents the total scrollable area.

# Enable pane scrollbars
# Values: "off", "modal", "on"
# - off: No scrollbars (default)
# - modal: Scrollbars only visible in copy mode or view mode
# - on: Scrollbars always visible
set -g @powerkit_pane_scrollbars "off"

# Scrollbar position
# Values: "left", "right"
set -g @powerkit_pane_scrollbars_position "right"

# Scrollbar slider (foreground) color
# Values: theme color name or hex color (#RRGGBB)
# The slider represents the currently visible portion of the pane content
set -g @powerkit_pane_scrollbars_style_fg "pane-border-active"

# Scrollbar track (background) color
# Values: theme color name or hex color (#RRGGBB)
# The track represents the total scrollable area
set -g @powerkit_pane_scrollbars_style_bg "pane-border-inactive"

# Scrollbar width in characters
# Values: integer (1-5 recommended)
set -g @powerkit_pane_scrollbars_width "1"

# Padding between scrollbar and pane content
# Values: integer (0-2 recommended)
set -g @powerkit_pane_scrollbars_pad "0"


# #############################################################################
#                              7. UI ELEMENTS
# #############################################################################

# =============================================================================
# CLOCK
# =============================================================================

# tmux clock mode format
# Values: "12", "24"
set -g @powerkit_clock_style "24"

# =============================================================================
# POPUPS
# =============================================================================

# Popup border line style
# Values: "single", "rounded", "heavy", "double", "simple", "padded", "none"
set -g @powerkit_popup_border_lines "rounded"

# =============================================================================
# MENUS
# =============================================================================

# Menu border line style
# Values: "single", "rounded", "heavy", "double", "simple", "padded", "none"
set -g @powerkit_menu_border_lines "rounded"


# #############################################################################
#                              8. KEYBINDINGS
# #############################################################################
# All keybindings use prefix + key format
# Set to "" (empty string) to disable a keybinding

# =============================================================================
# VIEWER KEYBINDINGS
# =============================================================================

# Options viewer popup
set -g @powerkit_show_options_key "C-e"
set -g @powerkit_show_options_width "80%"
set -g @powerkit_show_options_height "80%"

# Keybindings viewer popup
set -g @powerkit_show_keybindings_key "C-y"
set -g @powerkit_show_keybindings_width "80%"
set -g @powerkit_show_keybindings_height "80%"

# Log viewer popup
set -g @powerkit_log_viewer_key "M-l"
set -g @powerkit_log_viewer_width "90%"
set -g @powerkit_log_viewer_height "80%"

# =============================================================================
# ACTION KEYBINDINGS
# =============================================================================

# Theme selector popup
set -g @powerkit_theme_selector_key "C-r"

# Clear all cached data
set -g @powerkit_cache_clear_key "M-x"

# Reload tmux configuration
set -g @powerkit_reload_config_key "r"

# =============================================================================
# CONFLICT HANDLING
# =============================================================================

# Action when keybinding conflicts with existing bindings
# Values:
#   "warn"   - Detect and log conflicts, but still register (default)
#   "skip"   - Don't register PowerKit keybinding if conflict exists
#   "ignore" - Don't check for conflicts at all
set -g @powerkit_keybinding_conflict_action "warn"


# #############################################################################
#                              9. PLUGIN OPTIONS
# #############################################################################

# =============================================================================
# PLUGIN: audiodevices (macOS: SwitchAudioSource, Linux: pactl)
# =============================================================================

# Display mode
# Values: "off", "input", "output", "both"
set -g @powerkit_plugin_audiodevices_display_mode "both"

# Maximum device name length
set -g @powerkit_plugin_audiodevices_max_length "20"

# Truncation suffix when name is truncated
set -g @powerkit_plugin_audiodevices_truncate_suffix "..."

# Separator between input/output devices
set -g @powerkit_plugin_audiodevices_separator " | "

# Show input/output icons before device name
# Values: "true", "false"
set -g @powerkit_plugin_audiodevices_show_device_icons "true"

# Icons
set -g @powerkit_plugin_audiodevices_icon ""
set -g @powerkit_plugin_audiodevices_input_icon "󰍬"
set -g @powerkit_plugin_audiodevices_output_icon "󱄠"

# Keybindings (prefix + key) - empty string to disable
set -g @powerkit_plugin_audiodevices_keybinding_input "C-i"
set -g @powerkit_plugin_audiodevices_keybinding_output "C-o"

# Cache TTL in seconds
set -g @powerkit_plugin_audiodevices_cache_ttl "10"

# =============================================================================
# PLUGIN: battery
# =============================================================================

# Display mode
# Values: "percentage", "time"
set -g @powerkit_plugin_battery_display_mode "percentage"

# Hide plugin when battery is 100% and on AC power
# Values: "true", "false"
set -g @powerkit_plugin_battery_hide_when_full_and_charging "false"

# Thresholds (percentage)
set -g @powerkit_plugin_battery_warning_threshold "30"
set -g @powerkit_plugin_battery_critical_threshold "15"

# Icons
set -g @powerkit_plugin_battery_icon "󰁹"
set -g @powerkit_plugin_battery_icon_charging "󰂄"
set -g @powerkit_plugin_battery_icon_low "󰂃"
set -g @powerkit_plugin_battery_icon_critical "󰂎"

# Cache TTL in seconds
set -g @powerkit_plugin_battery_cache_ttl "30"

# =============================================================================
# PLUGIN: bitbucket
# =============================================================================

# Bitbucket type
# Values: "cloud", "datacenter"
set -g @powerkit_plugin_bitbucket_type "cloud"

# Bitbucket API URL (required for datacenter type)
set -g @powerkit_plugin_bitbucket_url ""

# Repositories to monitor
# Format: workspace/repo (cloud) or project/repo (datacenter)
# Multiple repos: comma-separated
set -g @powerkit_plugin_bitbucket_repos ""

# Atlassian account email (required for cloud)
set -g @powerkit_plugin_bitbucket_email ""

# API token (app password for cloud, personal access token for datacenter)
set -g @powerkit_plugin_bitbucket_token ""

# Display options
# Values: "on", "off"
set -g @powerkit_plugin_bitbucket_show_issues "on"
set -g @powerkit_plugin_bitbucket_show_prs "on"

# Separator between issues and PRs
set -g @powerkit_plugin_bitbucket_separator " | "

# Icons
set -g @powerkit_plugin_bitbucket_icon "󰂨"
set -g @powerkit_plugin_bitbucket_icon_issue ""
set -g @powerkit_plugin_bitbucket_icon_pr ""

# Warning thresholds (count)
set -g @powerkit_plugin_bitbucket_warning_threshold_issues "10"
set -g @powerkit_plugin_bitbucket_warning_threshold_prs "5"

# Cache TTL in seconds
set -g @powerkit_plugin_bitbucket_cache_ttl "300"

# =============================================================================
# PLUGIN: bitwarden
# =============================================================================

# Only show plugin when vault is unlocked (hide when locked)
# Values: "true", "false"
set -g @powerkit_plugin_bitwarden_show_only_when_unlocked "false"

# Icons
set -g @powerkit_plugin_bitwarden_icon "󰌆"
set -g @powerkit_plugin_bitwarden_icon_locked "󰌾"
set -g @powerkit_plugin_bitwarden_icon_unlocked "󰿆"
set -g @powerkit_plugin_bitwarden_icon_unauthenticated "󱀥"

# Keybindings (prefix + key) - empty string to disable
set -g @powerkit_plugin_bitwarden_keybinding_password "C-v"
set -g @powerkit_plugin_bitwarden_keybinding_totp "C-t"
set -g @powerkit_plugin_bitwarden_keybinding_unlock "C-w"
set -g @powerkit_plugin_bitwarden_keybinding_lock ""

