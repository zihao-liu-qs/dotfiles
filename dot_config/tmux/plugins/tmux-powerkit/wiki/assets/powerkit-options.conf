# Stock tickers to track (comma-separated)
set -g @powerkit_plugin_stocks_tickers "AAPL"

# Display format
# Values: "short" (price only), "full" (with change)
set -g @powerkit_plugin_stocks_format "short"

# Show stock ticker symbol
# Values: "true", "false"
set -g @powerkit_plugin_stocks_show_ticker "true"

# Show price change with direction arrow
