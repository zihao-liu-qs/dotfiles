# =============================================================================
# PLUGIN: weather
# =============================================================================

# Location (empty for auto-detect via IP geolocation)
# Format: city name or coordinates
set -g @powerkit_plugin_weather_location ""

# Temperature units
# Values: "m" (metric/Celsius), "u" (US/Fahrenheit), "M" (SI)
set -g @powerkit_plugin_weather_units "m"

# Display format
# Values:
#   "compact"  - Temperature and condition
#   "full"     - Temperature, condition, humidity
#   "minimal"  - Temperature only
#   "detailed" - All available info
#   Custom format with placeholders: %c %t %w %h %C %l
set -g @powerkit_plugin_weather_format "compact"

# Language code for weather descriptions
# Examples: en, pt, es, fr, de, ja, zh
set -g @powerkit_plugin_weather_language ""

# Hide + sign for positive temperatures
