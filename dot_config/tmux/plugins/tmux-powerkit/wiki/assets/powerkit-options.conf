set -g @powerkit_plugin_stocks_cache_ttl "300"

# =============================================================================
# PLUGIN: temperature (macOS and Linux)
# =============================================================================

# Temperature source
# Values: "auto", or SMC key (macOS: Tp0f, TC0P, etc.)
set -g @powerkit_plugin_temperature_source "auto"

# Temperature unit
# Values: "C" (Celsius), "F" (Fahrenheit)
set -g @powerkit_plugin_temperature_unit "C"

# Show unit symbol after value
# Values: "true", "false"
set -g @powerkit_plugin_temperature_show_unit "true"

# Hide plugin when temp below threshold (empty = always show)
set -g @powerkit_plugin_temperature_hide_below_threshold ""

# Icons (change based on temperature level)
set -g @powerkit_plugin_temperature_icon "󰔏"
set -g @powerkit_plugin_temperature_icon_warning "󰔉"
