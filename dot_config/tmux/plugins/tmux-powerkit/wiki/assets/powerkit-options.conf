set -g @powerkit_plugin_smartkey_icon_waiting "󰈷"

# Cache TTL in seconds
set -g @powerkit_plugin_smartkey_cache_ttl "2"

# =============================================================================
# PLUGIN: ssh
# =============================================================================

# Display format
# Values:
#   "auto"      - Auto-detect and show user@host
#   "host"      - Show host only
#   "user"      - Show user only
#   "indicator" - Show text indicator only
set -g @powerkit_plugin_ssh_format "auto"

# Text for indicator format
set -g @powerkit_plugin_ssh_text "SSH"

# Detection mode
# Values:
#   "session" - Check if tmux session is via SSH
#   "pane"    - Check if current pane is SSH
#   "current" - Check current shell process
set -g @powerkit_plugin_ssh_detection_mode "current"

# Show plugin when not in SSH session
# Values: "true", "false"
set -g @powerkit_plugin_ssh_show_when_local "false"

# Display components (when format=auto)
# Values: "true", "false"
set -g @powerkit_plugin_ssh_show_user "true"
set -g @powerkit_plugin_ssh_show_host "true"

# Icon
set -g @powerkit_plugin_ssh_icon "󰣀"

# Cache TTL in seconds
set -g @powerkit_plugin_ssh_cache_ttl "5"

